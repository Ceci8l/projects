<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio | Seçil Kalem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav class="container">
        <div class="logo">Seçil Kalem</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="cv.html">CV</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

<style>

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #fafafa;
    color: #111;
    display: flex;
    flex-direction: column;
  }

  /* Header ve main container */
  header, main {
    width: 100%;
  }

  main {
    flex: 1; /* footer hariç alanı kaplar */
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 20px;
  }

  .container {
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 20px;
  }

  h1 {
    font-size: 36px;
    margin-bottom: 10px;
  }

  p.description {
    font-size: 16px;
    color: #555;
    margin-bottom: 40px;
    line-height: 1.6;
  }

  /* Form styles */
  .contact-form {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .contact-form label {
    display: flex;
    flex-direction: column;
    font-size: 14px;
    color: #333;
    font-weight: 500;
  }

  .contact-form input,
  .contact-form textarea {
    margin-top: 6px;
    padding: 12px;
    font-size: 14px;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
    transition: border 0.2s, box-shadow 0.2s;
  }

  .contact-form input:focus,
  .contact-form textarea:focus {
    border-color: #111;
    box-shadow: 0 0 0 2px rgba(17,17,17,0.1);
  }

  .contact-form textarea {
    min-height: 120px;
    resize: vertical;
  }

  .contact-form button {
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    background-color: #111;
    color: #fff;
    cursor: pointer;
    transition: background 0.2s;
  }

  .contact-form button:hover {
    background-color: #333;
  }

  /* Footer sabitleme */
  footer {
    background-color: #fff;
    color: #000000;
    padding: 20px 0;
    text-align: center;
  }

</style>
</head>
<body>



<main>
  <h1>Start a Conversation</h1>
  <p class="description">
    I love turning ideas into meaningful digital experiences. Whether it’s a new project, collaboration, or just a conversation about design, feel free to reach out using the form below.
  </p>

  <form action="https://formspree.io/f/mqeyrzeb" method="POST" class="contact-form">
    <label>
      Your email:
      <input type="email" name="email" placeholder="you@example.com" required>
    </label>

    <label>
      Your message:
      <textarea name="message" placeholder="Write your message..." required></textarea>
    </label>

    <button type="submit">Send</button>
  </form>
</main>

    <footer>
        <div class="container">
     <p>©2026</p>
        </div>
    </footer>

</body>
</html>
